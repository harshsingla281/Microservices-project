name: CI/CD Pipeline (Backend Only)

on:
  push:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: EXP-16-SUBMISSION/Testing/Backend

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run tests
      run: pytest

    - name: Build Docker image
      run: docker build -t backend-test-app .

    - name: Show Docker images
      run: docker images
